<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</head>

<body>
    <div id="sectionHomepage">
        <div class="bg-container d-flex flex-column justify-content-center">
            <div class="card">
                <div class="main-heading">

                    <h1>UR MART</h1>
                </div>
                <div class="paragraph">
                    <p class="paragraph-home-page">Your own budget-friendly mart</p>
                    <p class="paragraph-home-page">Find latest trend and fashions at very low prices</p>
                </div>
                <button class="button" onclick="display('sectionCategorypage')">Order now</button>
            </div>
        </div>
    </div>
    <div id="sectionCategorypage">
        <div class="Categories-bg-container">
            <h1 class="main-heading">Urmart</h1>
            <div class="carousel-container">
                <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">
                    <ol class="carousel-indicators">
                        <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
                        <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
                        <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
                    </ol>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img class="d-block w-100" src="https://img.freepik.com/free-vector/gradient-sale-background-with-discount_23-2149038128.jpg?t=st=1727006164~exp=1727009764~hmac=091df6ca06f1a62a4d5a878b5b32ac7924fe792161fe453fe96a9964a1995dfe&w=740" alt="First slide">
                        </div>
                        <div class="carousel-item">
                            <img class="d-block w-100" src="https://img.freepik.com/premium-vector/comic-bookstyle-vector-template-with-special-offer-speech-bubbles-thunder-sign-bold-colors_1119746-2472.jpg?w=740" alt="Second slide">
                        </div>
                        <div class="carousel-item">
                            <img class="d-block w-100" src="https://img.freepik.com/premium-photo/large-collection-products-including-one-that-says-spray_976492-70123.jpg?w=826" alt="Third slide">
                        </div>
                    </div>
                    <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="sr-only">Previous</span>
                    </a>
                    <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="sr-only">Next</span>
                    </a>
                </div>
            </div>
            <h1 class="Category-heading">Categories</h1>
            <div class="categories-card-container d-flex flex-row justify-content-between " onclick="display('sectionClothing')">
                <h1>Clothings</h1>
                <img src="https://img.freepik.com/premium-photo/front-display-fashionable-clothing-boutique-store-window_960396-737171.jpg?w=740" class="image" />
            </div>
            <div class="grocery-card-container d-flex flex-row justify-content-between" onclick="display('sectionGrocery')">
                <h1>Grocery</h1>
                <img src="https://img.freepik.com/free-photo/lanes-shelves-with-goods-products-inside-supermarket-variety-preserves-pasta-shelves-full-tidy_123827-27553.jpg?t=st=1723480985~exp=1723484585~hmac=e1d1688ee03fbb7addc1baed538fff1751224c702b7c660cb9eb61aad3838f1e&w=740" class="image">
            </div>
            <div class="categories-card-container d-flex flex-row justify-content-between" onclick="diplay('sectionUtensil')">
                <h1>Utensils</h1>
                <img src="https://img.freepik.com/free-photo/top-view-supplies-arrangement-with-green-background_23-2149491446.jpg?t=st=1723481621~exp=1723485221~hmac=ee715f7df7f4b63b8402ca692f7ee60ec3dfa9f93b6bc67e52fcea19ac179bd6&w=740" class="image">
            </div>
            <div class="categories-card-container d-flex flex-row justify-content-between" onclick="display('sectionSports')">
                <h1>Sports</h1>
                <img src="https://img.freepik.com/premium-photo/flat-lay-various-sports-equipment_217507-39652.jpg?w=826" class="image">
            </div>
            <button class="button-back" onclick="display('sectionHomepage')"> Back </button>
        </div>
    </div>
    <div id="sectionClothing">
        <div class="clothes-bg-container">
            <h1 class="brand-heading">Brands</h1>
            <div class="clothes-brand-container-1 d-flex flex-row justify-content-center">
                <div class="Zara-card d-flex flex-column justify-content-center">
                    <img src="https://logos-world.net/wp-content/uploads/2020/05/Zara-Logo-1975-2008-700x394.png" class="logo-image">
                </div>
                <div class="versace-card">
                    <img src="https://1000logos.net/wp-content/uploads/2017/06/Versace-Emblem-500x404.jpg" class="logo-image-versace">
                </div>
            </div>
            <div class="clothes-brand-container-2 d-flex flex-row justify-content-center">
                <div class="gucci-card">
                    <img src="https://fabrikbrands.com/wp-content/uploads/Clothing-brand-logos-2-1200x750.png" class="logo-image-gucci">
                </div>
                <div class="enjoy-card">
                    <img src="https://images-platform.99static.com//6xahkPLfN9Z9Jx8jQwFsLjGOuAs=/341x81:841x581/fit-in/500x500/99designs-contests-attachments/84/84461/attachment_84461209" class="logo-image-enjoy">
                </div>
            </div>
            <div class="clothes-brand-container-3 d-flex flex-row justify-content-center">
                <div class="holister-card">
                    <img src="https://cdn.logojoy.com/wp-content/uploads/2018/05/30143419/95-768x591.png" class="logo-image-holister">
                </div>
                <div class="vimy-card">
                    <img src="https://images-platform.99static.com//onHsgzTZDHICr-Nx3ijM0j_QcpU=/502x535:1002x1035/fit-in/500x500/99designs-contests-attachments/88/88597/attachment_88597086" class="logo-image-vimy">
                </div>
            </div>
            <button class="button-brand-page">Explore More</button>
            <button class="button-brand-page-back" onclick="display('sectionCategorypage')">Back</button>
        </div>
    </div>
    <div id="sectionGrocery">
        <div class="Grocery-page-container">
            <h1 class="main-heading">Urmart</h1>
            <div class="grocery-container-1 d-flex flex-row justify-content-center">
                <div class="grocery-card d-flex flex-column justify-content-center">
                    <img src="https://img.freepik.com/free-photo/top-view-wooden-bowls-with-rice-pumpkin-seeds-black-pepper-powder-turmeric-lentiles-grey-background_140725-145835.jpg?t=st=1727002266~exp=1727005866~hmac=d069c3a62c261a9672ae892afd10a6fe0f1c30895028020aff67d7b7f93ff71c&w=740" class="image-grocery">
                    <h1 class="heading-grocery">dal</h1>
                </div>
                <div class="grocery-card d-flex flex-column justify-content-center">
                    <img src="https://img.freepik.com/free-photo/milled-rice-bowl-wooden-spoon-black-cement-floor_1150-20054.jpg?t=st=1727003110~exp=1727006710~hmac=342f885c02725c16c6e053723954f7034908f880b60464ccb0a405a5dfc9cf2e&w=740" class="image-grocery">
                    <h1 class="heading-grocery">Rice</h1>
                </div>
            </div>
            <div class="grocery-container-1 d-flex flex-row justify-content-center">
                <div class="grocery-card d-flex flex-column justify-content-center">
                    <img src="https://img.freepik.com/free-photo/dairy-products-wooden-table_23-2148239870.jpg?t=st=1727003311~exp=1727006911~hmac=38e295dca5016e4160e9fae8d75facbeff9cf2d5ce4fd026e459d40518ff805e&w=740" class="image-grocery">
                    <h1 class="heading-grocery">Dairy</h1>
                </div>
                <div class="grocery-card d-flex flex-column justify-content-center">
                    <img src="https://img.freepik.com/free-photo/pasta-cherry-tomatoes-with-variety-spices-herbs_114579-66650.jpg?t=st=1727003585~exp=1727007185~hmac=688efbf3d85a393d384dd696fa636ce008e5f7a8d355aa55b783e60e7674a67c&w=740" class="image-grocery">
                    <h1 class="heading-grocery">Spices</h1>
                </div>
            </div>
            <div class="grocery-container-1 d-flex flex-row justify-content-center">
                <div class="grocery-card d-flex flex-column justify-content-center">
                    <img src="https://img.freepik.com/premium-photo/pile-different-fruits-including-one-that-has-kiwi-it_1316263-214309.jpg?w=826" class="image-grocery">
                    <h1 class="heading-grocery">Fruits</h1>
                </div>
                <div class="grocery-card d-flex flex-column justify-content-center">
                    <img src="https://img.freepik.com/premium-photo/mixed-nuts-image-textured-wooden-surface_1036998-317942.jpg?w=740" class="image-grocery">
                    <h1 class="heading-grocery"> Dry Fruits</h1>
                </div>
            </div>
            <button class="button-brand-page-back" onclick="display('sectionCategorypage')">Back</button>
        </div>
    </div>

    <script type="text/javascript" src="https://d1tgh8fmlzexmh.cloudfront.net/ccbp-static-website/js/ccbp-ui-kit.js"></script>
</body>

</html>
